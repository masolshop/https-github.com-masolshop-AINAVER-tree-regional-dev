# ============================================================
# 타지역닷컴 — fail2ban jail 정의
# 위치: /etc/fail2ban/jail.d/regionwatch.conf
# 적용: sudo systemctl restart fail2ban
# 확인: sudo fail2ban-client status nginx-limit-req
# ============================================================
#
# 동작 흐름:
#   1) nginx 가 limit_req 초과 시 429 + error.log 에 "limiting requests" 라인 기록
#      (limit_req_log_level warn — nginx-ratelimit.conf 에서 설정됨)
#   2) fail2ban 이 해당 로그를 모니터링 → 짧은 시간 내 N회 누적 IP 검출
#   3) iptables/nftables 로 OS 방화벽 차단 (nginx 우회 불가)
#
# 주의 (Cloudflare 연동 후):
#   · X-Forwarded-For 의 실제 IP 를 보려면 nginx real_ip_module 설정 필수
#   · 그렇지 않으면 모든 IP 가 Cloudflare edge IP 로 보여 잘못 차단됨
#   · 자세한 내용은 deploy/cloudflare/README.md 참조

[DEFAULT]
# 차단 시간: 1시간 (반복 공격자는 recidive jail 에서 더 긴 차단)
bantime  = 1h
# 카운팅 윈도우: 10분 — 10분 내 maxretry 초과 시 ban
findtime = 10m
# 허용 횟수
maxretry = 10
# 차단 액션: iptables-multiport (HTTP/HTTPS 양쪽 차단)
banaction = iptables-multiport
# IP/CIDR 영구 화이트리스트 (관리자 IP, 모니터링 등 추가)
ignoreip = 127.0.0.1/8 ::1

# ────────────────────────────────────────────────────────────
# nginx limit_req (rate limit) 초과 IP 차단
# ────────────────────────────────────────────────────────────
[nginx-limit-req]
enabled  = true
filter   = nginx-limit-req
port     = http,https
logpath  = /var/log/nginx/error.log
# 10분 안에 20번 429 → 1시간 ban (사람의 우연한 burst 보호)
findtime = 10m
maxretry = 20
bantime  = 1h

# ────────────────────────────────────────────────────────────
# nginx 4xx 봇/스캐너 차단 (admin/.env/.git 같은 경로 폭격)
# ────────────────────────────────────────────────────────────
[nginx-botsearch]
enabled  = true
filter   = nginx-botsearch
port     = http,https
logpath  = /var/log/nginx/access.log
findtime = 10m
maxretry = 8
bantime  = 6h

# ────────────────────────────────────────────────────────────
# nginx 인증 실패 (auth_basic / 로그인 폭격)
# ────────────────────────────────────────────────────────────
[nginx-http-auth]
enabled  = true
filter   = nginx-http-auth
port     = http,https
logpath  = /var/log/nginx/error.log
findtime = 10m
maxretry = 5
bantime  = 2h

# ────────────────────────────────────────────────────────────
# 재범자 누적 차단 — 위 jail 들에서 1번이라도 ban 된 IP 가
# 24시간 안에 또 ban 되면 7일 차단 (장기 회피 봇 대응)
# ────────────────────────────────────────────────────────────
[recidive]
enabled  = true
filter   = recidive
logpath  = /var/log/fail2ban.log
banaction = iptables-allports
findtime = 1d
maxretry = 2
bantime  = 7d

# ────────────────────────────────────────────────────────────
# SSH 보호 (Lightsail 인스턴스 자체 — 표준)
# ────────────────────────────────────────────────────────────
[sshd]
enabled  = true
port     = ssh
logpath  = %(sshd_log)s
backend  = %(sshd_backend)s
findtime = 10m
maxretry = 5
bantime  = 2h
