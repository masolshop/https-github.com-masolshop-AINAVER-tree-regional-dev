# ============================================================
# fail2ban filter — nginx limit_req 초과 라인 매칭
# 위치: /etc/fail2ban/filter.d/nginx-limit-req.conf
# ============================================================
#
# nginx 가 rate limit 초과 시 error.log 에 다음 형식으로 기록한다:
#
#   2026/05/03 19:20:15 [error] 1234#0: *5678 limiting requests,
#       excess: 5.123 by zone "rl_api", client: 203.0.113.45,
#       server: taziyuk.com, request: "POST /api/v1/auth/login HTTP/1.1",
#       host: "taziyuk.com"
#
# limit_req_log_level 이 warn 이면 [warn] 으로 찍히는데, 일부 배포본에서
# error 레벨로 떨어지는 경우가 있어 두 레벨 모두 매칭한다.
# 또한 limit_conn (동시 연결수 초과) 라인도 함께 잡는다.

[Definition]

failregex = ^\s*\[(error|warn)\] \d+#\d+: \*\d+ limiting requests, excess:.* client: <HOST>,
            ^\s*\[(error|warn)\] \d+#\d+: \*\d+ limiting connections by zone.* client: <HOST>,

ignoreregex =

# fail2ban 5.x 호환 — datepattern 자동 인식되지만 명시적으로 지정해두면 안전
datepattern = {^LN-BEG}%%Y/%%m/%%d %%H:%%M:%%S
