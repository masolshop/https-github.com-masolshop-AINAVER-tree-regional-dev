# ============================================================
# 타지역닷컴 — Cloudflare 실제 IP 복원 설정
# 위치: /etc/nginx/conf.d/cloudflare-realip.conf
# 적용: sudo nginx -t && sudo systemctl reload nginx
# ============================================================
#
# Cloudflare 를 거치면 nginx 가 보는 $remote_addr 는 항상 Cloudflare edge IP.
# 이 상태에선:
#   1) 액세스 로그에 진짜 클라이언트 IP 가 안 남고
#   2) limit_req_zone $binary_remote_addr 가 모든 요청을 Cloudflare IP 로 묶어 무력화
#   3) fail2ban 이 Cloudflare IP 를 ban 하면 전 사이트가 죽는다.
#
# 해결: Cloudflare 가 보내주는 CF-Connecting-IP (또는 X-Forwarded-For)
#       헤더의 IP 를 신뢰해 $remote_addr 로 복원한다.
#
# 신뢰 IP 목록 (Cloudflare 공식, 정기 갱신):
#   https://www.cloudflare.com/ips-v4/
#   https://www.cloudflare.com/ips-v6/
#
# 자동 동기화는 deploy/cloudflare/update-cf-ips.sh 참고.
# ============================================================

# Cloudflare 가 보내는 헤더에서 진짜 IP 추출
real_ip_header CF-Connecting-IP;
# 체인된 프록시 무시 (마지막 trusted IP 가 보낸 헤더만 사용)
real_ip_recursive on;

# ── Cloudflare IPv4 (2024-2026 기준; 변경 시 update-cf-ips.sh 로 재생성) ──
set_real_ip_from 173.245.48.0/20;
