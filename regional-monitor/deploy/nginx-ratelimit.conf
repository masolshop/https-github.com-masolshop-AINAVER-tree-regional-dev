# ============================================================
# 타지역닷컴 — DDoS / Rate Limit 정의 (http 컨텍스트 전용)
# 위치: /etc/nginx/conf.d/regionwatch-ratelimit.conf
# 적용: sudo nginx -t && sudo systemctl reload nginx
# ============================================================
#
# nginx 의 limit_req_zone / limit_conn_zone 은 반드시 http {} 컨텍스트에
# 정의해야 한다. server 또는 location 블록에서는 정의 불가.
# /etc/nginx/conf.d/*.conf 는 nginx.conf 의 http {} 안에서 자동 include 된다.
#
# 키: $binary_remote_addr (IPv4=4byte, IPv6=16byte) — 메모리 효율적
# 10m zone ≈ 16만 IP 추적 가능

# ── 일반 트래픽: 초당 10요청, IP당 ──
limit_req_zone $binary_remote_addr zone=rl_general:10m rate=10r/s;

# ── /api/* 일반 API: 초당 5요청 ──
limit_req_zone $binary_remote_addr zone=rl_api:10m rate=5r/s;

# ── /api/v1/auth/* 인증/비밀번호: 분당 10요청 (브루트포스 방어) ──
limit_req_zone $binary_remote_addr zone=rl_auth:10m rate=10r/m;

# ── /api/v1/extract/*, /api/v1/verify/live: 외부 호출 비싼 작업 — 분당 20 ──
limit_req_zone $binary_remote_addr zone=rl_expensive:10m rate=20r/m;

# ── 동시 연결수 제한 (slowloris/소켓 점유 방어) ──
# IP 당 최대 30 동시 연결
limit_conn_zone $binary_remote_addr zone=cl_perip:10m;
# 서버 전체 동시 연결 (worker 보호용 안전장치)
limit_conn_zone $server_name zone=cl_perserver:10m;

# rate limit 초과 시 503 대신 429 (Too Many Requests) 반환
limit_req_status 429;
limit_conn_status 429;

# rate limit 로그 레벨 (warn 으로 띄워야 fail2ban 등 후속 분석 가능)
limit_req_log_level warn;
limit_conn_log_level warn;
