# ============================================================
# 타지역닷컴 (taziyuk.com) — nginx 사이트 설정
# 위치: /etc/nginx/sites-available/regionwatch
# 심볼릭 링크: /etc/nginx/sites-enabled/regionwatch
# 적용: sudo nginx -t && sudo systemctl reload nginx
# ============================================================
#
# ⚠️ Rate limit zone 은 /etc/nginx/conf.d/regionwatch-ratelimit.conf
#    (deploy/nginx-ratelimit.conf) 에 정의됨 — 함께 배포 필요.
# ============================================================

# www → non-www 영구 리다이렉트
server {
    listen 80;
    listen [::]:80;
    server_name www.taziyuk.com;
    return 301 https://taziyuk.com$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name taziyuk.com;
    return 301 https://taziyuk.com$request_uri;
}

# ── 메인 HTTPS 서버 ──
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name taziyuk.com www.taziyuk.com;

    client_max_body_size 100M;

    # ── Slowloris / 슬로우 HTTP 공격 방어 ──
    # 클라이언트가 헤더/바디를 천천히 보내 워커를 점유하지 못하도록 짧은 타임아웃
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;
    keepalive_timeout 30s 30s;
    # 비정상적으로 큰 헤더 차단 (HTTP smuggling/오버플로 방어)
    large_client_header_buffers 4 8k;
    # 서버 nginx 버전 노출 차단
    server_tokens off;

    # ── 동시 연결수 제한 (DDoS / 슬로우 연결 보호) ──
    limit_conn cl_perip 30;
    limit_conn cl_perserver 2000;

    # ── 보안 헤더 (모든 응답에 공통 적용) ──
    # HSTS: 1년, 서브도메인 포함, preload 가능 (HTTPS 강제)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # 클릭재킹 방지 (iframe 임베드 차단)
    add_header X-Frame-Options "SAMEORIGIN" always;
    # MIME sniffing 차단
    add_header X-Content-Type-Options "nosniff" always;
    # Referrer 정보 제한
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # 권한 정책 (불필요한 브라우저 API 차단)
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(self)" always;
    # XSS 보호 (구형 브라우저 호환)
    add_header X-XSS-Protection "1; mode=block" always;

    # SPA 정적 파일
    root /opt/regionwatch/regional-monitor/frontend/dist;
    index index.html;

    # ── 동적 SEO 라우트 (백엔드에서 자동 생성) ──
    # /sitemap.xml → FastAPI /api/v1/seo/sitemap.xml
    location = /sitemap.xml {
        # 봇/크롤러 표적이 되기 쉬워 일반 rate limit 적용
        limit_req zone=rl_general burst=20 nodelay;
        proxy_pass http://127.0.0.1:8000/api/v1/seo/sitemap.xml;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30;
    }
    # /rss.xml → FastAPI /api/v1/seo/rss.xml
    location = /rss.xml {
        limit_req zone=rl_general burst=20 nodelay;
        proxy_pass http://127.0.0.1:8000/api/v1/seo/rss.xml;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30;
    }

    # ── /api/v1/auth/* — 브루트포스 방어 (분당 10회, burst 5) ──
    location ^~ /api/v1/auth/ {
        limit_req zone=rl_auth burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60;
        proxy_connect_timeout 10;
    }

    # ── /api/v1/extract/*, /api/v1/verify/live — 외부 호출 비싼 작업 ──
    location ^~ /api/v1/extract/ {
        limit_req zone=rl_expensive burst=10 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600;
        proxy_connect_timeout 30;
    }
    location = /api/v1/verify/live {
        limit_req zone=rl_expensive burst=10 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600;
        proxy_connect_timeout 30;
    }

    # /api/v1/* → FastAPI (일반 API rate limit)
    location /api/ {
        limit_req zone=rl_api burst=20 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600;
        proxy_connect_timeout 30;
    }

    # /health → FastAPI (모니터링용 — rate limit 없음, 가벼움)
    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
        access_log off;
    }

    # 정적 자산 캐시 (해시 파일 — 1년 immutable)
    # 주의: nginx add_header 는 location 컨텍스트가 있으면 server 블록을 무시하므로
    # 모든 location 에서 보안 헤더를 다시 명시한다.
    location /assets/ {
        expires 365d;
        add_header Cache-Control "public, immutable" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(self)" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    # robots.txt — 정적 파일 그대로 (변경 시 frontend 빌드 후 반영)
    location = /robots.txt {
        expires 1d;
        add_header Cache-Control "public, max-age=86400" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(self)" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    # index.html — 항상 최신본을 가져와야 함 (해시 청크 404 방지)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(self)" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    # SPA fallback (일반 트래픽 — 초당 10요청, burst 30 허용)
    location / {
        limit_req zone=rl_general burst=30 nodelay;
        try_files $uri $uri/ /index.html;
        # 동적으로 fallback된 HTML 응답에도 캐시 비활성화 + 보안 헤더
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(self)" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    # SSL (Certbot 관리)
    ssl_certificate /etc/letsencrypt/live/taziyuk.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/taziyuk.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# ============================================================
# IP 직접 접속 차단 (default_server) — taziyuk.com Host 헤더 없는 모든 요청 즉시 종료
# Cloudflare 우회 직접 IP 공격 차단 + 무효 Host 헤더 봇 트래픽 차단
# (Lightsail 방화벽 화이트리스트 대신 nginx 레벨 차단으로 동등 효과)
# ============================================================
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    # default_server는 SSL 인증서가 반드시 있어야 nginx가 시작됨
    ssl_certificate /etc/letsencrypt/live/taziyuk.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/taziyuk.com/privkey.pem;

    # Slowloris 방어 (정상 server와 동일 수준)
    client_body_timeout 5s;
    client_header_timeout 5s;

    return 444;
}
